name: opencode local trigger

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode-dev:
    if: |
      github.event.comment.body != '' &&
      (
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        startsWith(github.event.comment.body, '/opencode')
      )
    uses: sotonye-dagogo-dev/.github-workflows/.github/workflows/opencode-runner.yml@main
    secrets: inherit

  opencode-design:
    if: |
      github.event.comment.body != '' &&
      (
        contains(github.event.comment.body, ' /design') ||
        startsWith(github.event.comment.body, '/design') ||
        contains(github.event.comment.body, ' /od') ||
        startsWith(github.event.comment.body, '/od') ||
        contains(github.event.comment.body, ' /opendesign') ||
        startsWith(github.event.comment.body, '/opendesign')
      )
    uses: sotonye-dagogo-dev/.github-workflows/.github/workflows/opendesign-runner.yml@main
    secrets: inherit
